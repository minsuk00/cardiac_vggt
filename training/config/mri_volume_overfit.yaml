# PYTHONUNBUFFERED=1 PYTHONPATH=training:. torchrun --nproc_per_node=1 --master_port=29510 training/launch.py --config mri_volume_overfit
#
# Single-subject overfit sanity check for the unsupervised volume loss.

defaults:
  - mri_volume
  - _self_

split_file: "training/splits/overfit_p001.txt"
exp_name: "${rev_ts:}_mri_volume_overfit_p001"

# Single subject → much fewer unique (z, t) combinations → fewer batches needed
limit_train_batches: 100
limit_val_batches: 20
max_epochs: 50

logging:
  log_freq: 5
  log_visual_frequency:
    train: 100  # once per epoch (matches limit_train_batches=100)
    val: 20     # once per val epoch

checkpoint:
  save_freq: 10
