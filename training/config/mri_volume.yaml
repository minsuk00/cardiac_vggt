# PYTHONUNBUFFERED=1 PYTHONPATH=training:. torchrun --nproc_per_node=1 --master_port=29507 training/launch.py --config mri_volume
#
# Unsupervised slice-to-volume: drops GT-DVF supervision, adds splat+resample intensity loss.
#
# PRIMARY PIPELINE = TARGET-PHASE REFERENCE-SLICE CONDITIONING (docs/24, docs/25). The query
# is no longer a content-free target_t INDEX (which regressed every patient's EF to the cohort
# mean, ~48%); instead slot 0 is a real target-phase reference slice at the mid-ventricular
# plane, marked via VGGT's native camera_token anchor. The model reads the target phase from
# slot-0's image content. This fixes BOTH the flat-EF amplitude regression and the
# target_t=k/12 phase-timing ambiguity. Requires the aggregator finetune (aggft) so the
# camera_token / z_embedder can specialize. `target_t_indices` is still emitted by the dataset
# but is INERT (use_target_t_pose_embedding=false → the model ignores it).

defaults:
  - mri_finetune
  - _self_

exp_name: "${rev_ts:}_mri_volume_${mri_data_mode}_${mri_mode}_${dataset_name}"
config_name: "mri_volume"

# ── Reference-slice conditioning (overrides mri_finetune defaults) ───────────────────────────
use_reference_token: true            # MODEL: add the native camera_token anchor on slot 0
reference_slot: true                 # DATASET: slot 0 = (t_target, mid-ventricular z)
use_z_pose_embedding: true           # keep per-slice depth
use_t_pose_embedding: false          # input cardiac phase is obsolete (docs/05/09) and blind-input contract (docs/04)
use_target_t_pose_embedding: false   # the broken content-free index — replaced by the reference slice

logging:
  log_visual_frequency:
    train: 1000  # once per epoch (matches limit_train_batches)
    val: 200     # once per val epoch
  scalar_keys_to_log:
    train:
      keys_to_log:
        - loss_objective
        - loss_volume
        - loss_pos_tv
        - loss_diffusion
        # Full-volume metrics (averaged over all D·H·W = 786K voxels).
        # Matches what the L1 loss is optimizing.
        - metric_mae_3d_full
        - metric_mse_3d_full
        - metric_psnr_3d_full
        - metric_ssim_3d_full
        # Bbox-cropped metrics (only voxels inside the subject's geometric
        # native-FOV region — derived from a content mask propagated through
        # the canonical resample/pad/crop transforms, not from intensity).
        # For small-FOV subjects this excludes the padded zeros that inflate
        # full-volume PSNR. For full-FOV subjects bbox == full.
        - metric_mae_3d_bbox
        - metric_mse_3d_bbox
        - metric_psnr_3d_bbox
        - metric_gt_coverage_frac
        - metric_mean_disp_norm
        - metric_coverage_frac
        - metric_coverage_mean
    val:
      keys_to_log:
        - loss_objective
        - loss_volume
        - loss_pos_tv
        - loss_diffusion
        - metric_mae_3d_full
        - metric_mse_3d_full
        - metric_psnr_3d_full
        - metric_ssim_3d_full
        - metric_mae_3d_bbox
        - metric_mse_3d_bbox
        - metric_psnr_3d_bbox
        - metric_gt_coverage_frac
        - metric_mean_disp_norm
        - metric_coverage_frac
        - metric_coverage_mean

checkpoint:
  save_freq: 50  # 3 numbered archives over 200 epochs (epochs 50/100/150) + checkpoint_last each epoch

# ── Aggregator finetune (aggft) — required for reference-slice conditioning ──────────────────
# Reference conditioning needs the camera_token (the slot-0 anchor) + z_embedder to specialize,
# so we train the DINOv2 attention blocks + embedders + camera_token and freeze ONLY patch_embed
# (NOT the head-only "*aggregator*" wildcard the parent mri_finetune uses). ~2.8× slower,
# ~27 GB/A40. find_unused_parameters=true is required once the aggregator is unfrozen (disabled
# depth/track/camera heads + register tokens get no gradient in the point-only forward), else
# DDP raises "Expected to have finished reduction…". Mirrors mri_volume_bspline/diffusion.
optim:
  frozen_module_names: ["*patch_embed*"]

distributed:
  find_unused_parameters: true

loss:
  camera:
    weight: 0.0
  depth:
    weight: 0.0
  point:
    weight: 0.0  # disable supervised DVF loss
  volume:
    weight: 1.0
    grid_shape: ${gt_grid_shape}  # (D, H, W); shared with MRIDataset.gt_grid_shape
    tv_weight: 0.1
    # L2 diffusion (Tikhonov) smoothness ‖∇u‖² on the DVF (VoxelMorph-style). 0.0 ⇒ no-op.
    # DVF is in normalized [-1,1] coords ⇒ gradients are tiny, so a nonzero weight is O(10–1000).
    diffusion_weight: 0.0
    refiner_lambda: 1.0  # λ on the L1 part of L_post (only used when enable_refiner=true)
    refiner_ssim_weight: 0.0  # w on the 2D-SSIM part of L_post: λ·L1 + w·(1−SSIM_2d). 0 ⇒ L1-only

# ── GPU augmentation (batchaug) ─────────────────────────────────────────────
# Off by default. Flip `enable: true` to opt in. Augmentation is applied to the
# (B, T=12, D=12, H=256, W=256) canonical phases tensor in the trainer between
# `copy_data_to_device` and forward — one affine per subject, shared across
# all 12 T-phases so cardiac motion stays consistent. After aug:
#   - `gt_target_volume` is re-derived as `phases_aug[b, t_target[b]]`
#   - input slices are re-extracted at the original (t, z) pairs
#   - `anatomy_bbox` is recomputed from the augmented content mask
# Val never augments regardless of this flag.
#
# `tier`:
#   "conservative" — H-flip, ±5° in-plane rotate, small translate/scale,
#                    light noise, gamma, mild bias field. No through-plane
#                    rotation (Z is 8 mm anisotropic), no elastic.
#   "moderate"     — reserved; not implemented yet.
#
# `respiratory`: INDEPENDENT breathing-motion sim (separate toggle from affine).
# A per-input-slice deform-then-reslice SI+AP shift (Lujan waveform), applied
# AFTER affine and overwriting ONLY the input slices — target/scanner_coords stay
# at the end-expiration reference, so the model learns to CORRECT breathing (blind
# to r). Unlike affine, it applies in BOTH train (iid per epoch, private RNG) AND
# val (deterministic per seq_index) — so val measures the real corrupted->clean
# task. `direction_jitter_deg` randomizes the SI direction (SAX stacks are tilted
# ~20-45° off true SI); 0 → pure SI+AP. Off by default → bit-identical to today.
data:
  augmentation:
    enable: false               # affine/photometric aug OFF (aggressive aug hurts in-dist; docs/05)
    tier: "conservative"
    respiratory:
      enable: true              # breathing sim ON for all reference runs (the proven "resp, z-only" recipe; docs/05). Inherited by mri_volume_diffusion/bspline.
      amplitude_mm: 16.0        # mean SI breath depth (mm)
      amplitude_jitter: 8.0     # +/- jitter → ~8-24mm (tidal → deep)
      cos2n: 3                  # Lujan sin^{2n} exhale-dwell knob
      ap_ratio: 0.35            # AP displacement = ap_ratio * SI
      ap_axis: "H"              # in-plane axis carrying AP ("H" or "W")
      per_slot: true            # independent breath per input slice (scattered regime)
      direction_jitter_deg: 30.0  # max random tilt of SI+AP off the D axis (0 → none)
