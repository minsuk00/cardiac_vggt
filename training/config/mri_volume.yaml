# PYTHONUNBUFFERED=1 PYTHONPATH=training:. torchrun --nproc_per_node=1 --master_port=29507 training/launch.py --config mri_volume
#
# Unsupervised slice-to-volume: drops GT-DVF supervision, adds splat+resample intensity loss.

defaults:
  - mri_finetune
  - _self_

exp_name: "${rev_ts:}_mri_volume_${mri_data_mode}_${mri_mode}_${dataset_name}"
config_name: "mri_volume"

logging:
  log_visual_frequency:
    train: 1000  # once per epoch (matches limit_train_batches)
    val: 200     # once per val epoch
  scalar_keys_to_log:
    train:
      keys_to_log:
        - loss_objective
        - loss_volume
        - loss_pos_tv
        # Full-volume metrics (averaged over all D·H·W = 786K voxels).
        # Matches what the L1 loss is optimizing.
        - metric_mae_3d_full
        - metric_mse_3d_full
        - metric_psnr_3d_full
        - metric_ssim_3d_full
        # Bbox-cropped metrics (only voxels inside the subject's geometric
        # native-FOV region — derived from a content mask propagated through
        # the canonical resample/pad/crop transforms, not from intensity).
        # For small-FOV subjects this excludes the padded zeros that inflate
        # full-volume PSNR. For full-FOV subjects bbox == full.
        - metric_mae_3d_bbox
        - metric_mse_3d_bbox
        - metric_psnr_3d_bbox
        - metric_gt_coverage_frac
        - metric_mean_disp_norm
        - metric_coverage_frac
        - metric_coverage_mean
    val:
      keys_to_log:
        - loss_objective
        - loss_volume
        - loss_pos_tv
        - metric_mae_3d_full
        - metric_mse_3d_full
        - metric_psnr_3d_full
        - metric_ssim_3d_full
        - metric_mae_3d_bbox
        - metric_mse_3d_bbox
        - metric_psnr_3d_bbox
        - metric_gt_coverage_frac
        - metric_mean_disp_norm
        - metric_coverage_frac
        - metric_coverage_mean

checkpoint:
  save_freq: 50  # 3 numbered archives over 200 epochs (epochs 50/100/150) + checkpoint_last each epoch

loss:
  camera:
    weight: 0.0
  depth:
    weight: 0.0
  point:
    weight: 0.0  # disable supervised DVF loss
  volume:
    weight: 1.0
    grid_shape: ${gt_grid_shape}  # (D, H, W); shared with MRIDataset.gt_grid_shape
    tv_weight: 0.1

# ── GPU augmentation (batchaug) ─────────────────────────────────────────────
# Off by default. Flip `enable: true` to opt in. Augmentation is applied to the
# (B, T=12, D=12, H=256, W=256) canonical phases tensor in the trainer between
# `copy_data_to_device` and forward — one affine per subject, shared across
# all 12 T-phases so cardiac motion stays consistent. After aug:
#   - `gt_target_volume` is re-derived as `phases_aug[b, t_target[b]]`
#   - input slices are re-extracted at the original (t, z) pairs
#   - `anatomy_bbox` is recomputed from the augmented content mask
# Val never augments regardless of this flag.
#
# `tier`:
#   "conservative" — H-flip, ±5° in-plane rotate, small translate/scale,
#                    light noise, gamma, mild bias field. No through-plane
#                    rotation (Z is 8 mm anisotropic), no elastic.
#   "moderate"     — reserved; not implemented yet.
#
# `respiratory`: INDEPENDENT breathing-motion sim (separate toggle from affine).
# A per-input-slice deform-then-reslice SI+AP shift (Lujan waveform), applied
# AFTER affine and overwriting ONLY the input slices — target/scanner_coords stay
# at the end-expiration reference, so the model learns to CORRECT breathing (blind
# to r). Unlike affine, it applies in BOTH train (iid per epoch, private RNG) AND
# val (deterministic per seq_index) — so val measures the real corrupted->clean
# task. `direction_jitter_deg` randomizes the SI direction (SAX stacks are tilted
# ~20-45° off true SI); 0 → pure SI+AP. Off by default → bit-identical to today.
data:
  augmentation:
    enable: false
    tier: "conservative"
    respiratory:
      enable: false
      amplitude_mm: 16.0        # mean SI breath depth (mm)
      amplitude_jitter: 8.0     # +/- jitter → ~8-24mm (tidal → deep)
      cos2n: 3                  # Lujan sin^{2n} exhale-dwell knob
      ap_ratio: 0.35            # AP displacement = ap_ratio * SI
      ap_axis: "H"              # in-plane axis carrying AP ("H" or "W")
      per_slot: true            # independent breath per input slice (scattered regime)
      direction_jitter_deg: 30.0  # max random tilt of SI+AP off the D axis (0 → none)
