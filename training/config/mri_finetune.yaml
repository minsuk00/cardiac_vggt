# PYTHONUNBUFFERED=1 PYTHONPATH=training:. torchrun --nproc_per_node=1 --master_port=29507 training/launch.py --config mri_finetune

defaults:
  - default
  - _self_

# Global overrides
split: "train"
mode: "train"

# --- Main Controls ---
data_root: "/home/minsukc/vggt/scratch/data/CMRxRecon2024/Cine_combined"
split_file: "training/splits/random_8_1_1.txt"
mri_mode: "axial"
mri_data_mode: "dynamic" # "static" or "dynamic"

train_on_residual_dvf: true
use_z_pose_embedding: true
use_t_pose_embedding: true
use_target_t_pose_embedding: true
# Reference-slice conditioning (docs/25): slot 0 = target-phase reference at the mid-ventricular
# plane, marked via the native camera_token anchor instead of a target_t index. Default off here
# (parent config keeps the legacy decoupled behavior); mri_volume.yaml turns it on and disables
# use_t/use_target_t. `reference_slot` is the DATASET half (slot-0 sampling); `use_reference_token`
# is the MODEL half (camera_token anchor). They must move together.
use_reference_token: false
reference_slot: false
# Optional 3D UNet refiner on the splat (default OFF ⇒ bit-identical to today).
enable_refiner: false
refiner_use_coverage: true   # feed coverage as a 2nd input channel (only used when enabled)
limit_train_batches: 1000
limit_val_batches: 200
max_epochs: 200
val_epoch_freq: 1
# Canonical-grid shape (D, H, W). Single source of truth — referenced by both
# MRIDataset.gt_grid_shape and loss.volume.grid_shape so they can't drift.
gt_grid_shape: [12, 256, 256]
# Target-phase control. null = uniform sampling per call (new pipeline, multi-phase).
# Set to an int (e.g., 0) to force every sample to use that phase as the target —
# 0 reproduces the original ED-only pipeline.
t_target_fixed: null
# Restrict the multi-phase target pool to a subset of phases (e.g. [0, 7]) instead
# of all T. null → all phases. Train picks uniformly from the list; val cycles it
# deterministically. Mutually exclusive with t_target_fixed (single-phase wins).
t_target_phases: null
# ---------------------

dataset_name: "${basename:${data_root}}"
exp_name: "${rev_ts:}_mri_${mri_data_mode}_${mri_mode}_${dataset_name}"
num_workers: 4
max_img_per_gpu: 12
accum_steps: 1

# Redirect Logging and Checkpoints to Scratch
logging:
  log_dir: "./scratch/logs/${exp_name}"
  log_freq: 5
  log_visuals: True
  log_visual_frequency:
    train: 100
    val: 40
  visuals_per_batch_to_log: 4
  video_logging_fps: 4
  # Multi-phase cardiac-cycle filmstrip (val-only, gated on t_target_fixed is None).
  # Logged every N val epochs (~72s: 12 model forwards on A40). Set to 1 to watch the
  # full-cycle V_gt vs V_canon reconstruction every epoch.
  filmstrip_every_n_val_epochs: 1
  # Dump per-subject predicted + GT volumes to ${log_dir}/val_volumes/ each val epoch.
  # Overwrites in place (constant ~360 MB disk). Identity affine (canonical voxel space).
  save_val_volumes: true
  tensorboard_writer:
    path: ${logging.log_dir}/tensorboard
  wandb_writer:
    _target_: train_utils.wandb_writer.WandbLogger
    project: "vggt-mri"
    name: ${exp_name}
    dir: ${logging.log_dir}/wandb
    tags:
      - ${oc.select:config_name,mri}
      - ${phase_mode:${t_target_fixed}}
  scalar_keys_to_log:
    train:
      keys_to_log:
        - loss_objective
        - loss_conf_point
        - loss_reg_point
        - loss_grad_point
    val:
      keys_to_log:
        - loss_objective
        - loss_conf_point
        - loss_reg_point
        - loss_grad_point
  visuals_keys_to_log:
    train:
      modality: "image"
      keys_to_log:
        - images
        - world_points
        - pred_world_points
    val:
      modality: "image"
      keys_to_log:
        - images
        - world_points
        - pred_world_points

checkpoint:
  save_dir: "${logging.log_dir}/ckpts"
  save_freq: 200
  resume_checkpoint_path: "./scratch/base_weights/vggt1b_base.pt"
  strict: false

# Override data to use ONLY MRIDataset via ComposedDataset
data:
  train:
    _target_: data.dynamic_dataloader.DynamicTorchDataset
    num_workers: ${num_workers}
    max_img_per_gpu: ${max_img_per_gpu}
    shuffle: True
    pin_memory: False
    common_config:
      fix_img_num: -1
      fix_aspect_ratio: 1.0
      load_track: False
      track_num: 1024
      training: True
      inside_random: True
      img_size: ${img_size}
      patch_size: ${patch_size}
      rescale: True
      rescale_aug: True
      landscape_check: False
      debug: False
      get_nearby: True
      load_depth: False
      img_nums: [12, 12]  # fixed S=12 (capped per-subject by min(T_total, Z_total))
      max_img_per_gpu: ${max_img_per_gpu}
      allow_duplicate_img: True
      repeat_batch: False
      normalize_points: false
      augs:
        cojitter: True
        cojitter_ratio: 0.0
        scales: [1.0, 1.0]
        aspects: [1.0, 1.0]
        color_jitter:
          p: 0.0
        gray_scale: False
        gau_blur: False
    dataset:
      _target_: data.composed_dataset.ComposedDataset
      dataset_configs:
        - _target_: data.MRIDataset
          data_root: ${data_root}
          split: ${split}
          split_file: ${split_file}
          mode: ${mri_data_mode}
          mri_mode: ${mri_mode}
          num_slices: 12
          target_size: ${img_size}
          gt_grid_shape: ${gt_grid_shape}
          t_target_fixed: ${t_target_fixed}
          t_target_phases: ${t_target_phases}
          reference_slot: ${reference_slot}
  val:
    _target_: data.dynamic_dataloader.DynamicTorchDataset
    num_workers: ${num_workers}
    max_img_per_gpu: ${max_img_per_gpu}
    shuffle: False
    pin_memory: False
    common_config:
      fix_img_num: -1
      fix_aspect_ratio: 1.0
      load_track: False
      track_num: 1024
      training: False
      inside_random: False
      img_size: ${img_size}
      patch_size: ${patch_size}
      rescale: True
      rescale_aug: False
      landscape_check: False
      debug: False
      get_nearby: True
      load_depth: False
      img_nums: [12, 12]  # fixed S=12 (capped per-subject by min(T_total, Z_total))
      max_img_per_gpu: ${max_img_per_gpu}
      allow_duplicate_img: True
      repeat_batch: False
      normalize_points: false
      augs:
        cojitter: False
        cojitter_ratio: 0.0
        scales: [1.0, 1.0]
        aspects: [1.0, 1.0]
        color_jitter:
          p: 0.0
        gray_scale: False
        gau_blur: False
    dataset:
      _target_: data.composed_dataset.ComposedDataset
      dataset_configs:
        - _target_: data.MRIDataset
          data_root: ${data_root}
          split: "val"
          split_file: ${split_file}
          mode: ${mri_data_mode}
          mri_mode: ${mri_mode}
          num_slices: 12
          target_size: ${img_size}
          gt_grid_shape: ${gt_grid_shape}
          t_target_fixed: ${t_target_fixed}
          t_target_phases: ${t_target_phases}
          reference_slot: ${reference_slot}

# Enable Point Head, disable others
model:
  enable_camera: false
  enable_depth: false
  enable_point: true
  enable_track: false
  use_z_pose_embedding: ${use_z_pose_embedding}
  use_t_pose_embedding: ${use_t_pose_embedding}
  use_target_t_pose_embedding: ${use_target_t_pose_embedding}
  use_reference_token: ${use_reference_token}
  train_on_residual_dvf: ${train_on_residual_dvf}
  # Optional 3D UNet refiner on the splatted volume (default OFF ⇒ pipeline unchanged).
  enable_refiner: ${enable_refiner}
  grid_shape: ${gt_grid_shape}
  refiner_base_channels: 16
  refiner_levels: 2
  refiner_use_coverage: ${refiner_use_coverage}
  # Warp head: "dpt" (default per-pixel DPT) or "bspline" (coarse control grid + B-spline
  # upsample, smooth-by-construction). bspline_grid_size = control points per side.
  warp_head_type: "dpt"
  bspline_grid_size: 32

# Configure Loss
loss:
  camera:
    weight: 0.0
  depth:
    weight: 0.0
  point:
    weight: 1.0
    # gamma/alpha=0 disables confidence weighting; cardiac mask replaces it (see CLAUDE.md)
    gamma: 0.0
    alpha: 0.0
    gradient_loss_fn: "normal" # Automatically becomes "grad" if train_on_residual_dvf=True
    valid_range: 0.98
    grad_weight: 0.0
    tv_weight: 0.1
    train_on_residual_dvf: ${model.train_on_residual_dvf}

# Configure Optim — entire aggregator frozen (incl. z/t Fourier embedders); only point_head trains.
#
# Why z_embedder + t_embedder are ALSO frozen (despite living "in" the aggregator):
#   In an earlier iteration we enumerated the heavy aggregator subparts so the embedders
#   stayed trainable. A controlled A/B (see /tmp/ab_single.py history) measured the cost:
#     OLD wildcard `*aggregator*` (embedders frozen):     1.32 sec/step
#     NEW enumerated (embedders trainable):               3.25 sec/step  → 2.5× slower
#   The 28K-param embedders are tiny but trainable, which forces backward to traverse
#   ALL 48 frozen attention blocks via gradient checkpointing recomputation to reach
#   them. The compute cost is in the autograd graph traversal, not the params themselves.
#
# Since the 4-day baseline (which had embedders frozen at random init by accident) reached
# 31+ dB PSNR on ED-only, the trainable embedders aren't proven to help quality — but they
# would halve our usable epochs per 48h SLURM slot. Frozen wins on practical throughput.
#
# When to revisit: if you unfreeze the aggregator's attention blocks (e.g., for a
# fundamental retraining on free-breathing data or Option B continuous-phase support),
# the backward already traverses those blocks, so making embedders trainable becomes
# free. In that scenario, enumerate the subparts explicitly and let z/t embedders learn.
optim:
  frozen_module_names: ["*patch_embed*", "*camera_token*", "*aggregator*"]
  amp:
    enabled: true
    amp_dtype: bfloat16
  gradient_clip:
    configs:
      - module_name: ["aggregator"]
        max_norm: 1.0
        norm_type: 2
      - module_name: ["point"]
        max_norm: 1.0
        norm_type: 2
      # Refiner params (only exist when enable_refiner=true). Empty group ⇒ skipped
      # by the clipper when off (see gradient_clip.py:95), so this is a no-op then.
      - module_name: ["refiner"]
        max_norm: 1.0
        norm_type: 2

optimizer:
  lr: 5e-5
